   if(hit){tip.style.display='block';tip.style.left=Math.min(mx+12,W-150)+'px';tip.style.top=(my+12)+'px';
    if(hit.t==='n'){var nm=S[hit.i],av=avg(hit.i).toFixed(2),tops=S.map(function(ss,jj){return [ss,M[hit.i][jj],jj];}).filter(function(p){return p[2]!==hit.i;}).sort(function(a,b){return b[1]-a[1];}).slice(0,2);
     tip.innerHTML="<b style='color:#46e6c8'>"+nm+"</b><br>avg correlation with basket: <b>"+av+"</b><br>moves most with: "+tops.map(function(p){return p[0]+" ("+p[1]+")";}).join(', ')+"<br><span style='color:#5d7799'>lower avg = better diversifier</span>";}
    else{var cv=M[hit.i][hit.j];tip.innerHTML="<b style='color:#46e6c8'>"+S[hit.i]+" ↔ "+S[hit.j]+"</b><br>correlation <b>"+cv+"</b> — they move together ~"+Math.round(cv*100)+"% of the time<br><span style='color:#5d7799'>high = less diversification</span>";}
   }else tip.style.display='none';});
  c.addEventListener('mouseleave',function(){tip.style.display='none';render(null);});}}}
 loop();}
})();
</script>
