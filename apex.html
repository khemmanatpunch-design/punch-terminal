 var geo=new THREE.PlaneGeometry(11,11,44,44);var pos=geo.attributes.position;var base=[];for(var v=0;v<pos.count;v++)base.push([pos.getX(v),pos.getY(v)]);
 var pts=Object.keys(CH.symbols).map(function(k,i){var d=CH.symbols[k];var a=i/Math.max(1,Object.keys(CH.symbols).length)*6.283;return {x:Math.cos(a)*3.4,y:Math.sin(a)*3.4,h:Math.max(-1.2,Math.min(1.6,(d.ytd||0)/35))};});

function ptSeg(px,py,x1,y1,x2,y2){var dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;if(l2===0)return Math.hypot(px-x1,py-y1);var t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/l2));return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));}
function drawNetwork(){var c=document.getElementById('netg');if(!c)return;var r=c.getBoundingClientRect();if(r.width<8)return;var dp=window.devicePixelRatio||1;c.width=r.width*dp;c.height=320*dp;var x=c.getContext('2d');x.setTransform(dp,0,0,dp,0,0);var W=r.width,H=320;var S=A.corr.symbols,M=A.corr.matrix;if(!S.length)return;
