function drawEquity(){var c=document.getElementById('eqc');if(!c)return;var r=c.getBoundingClientRect(),d=window.devicePixelRatio||1;c.width=r.width*d;c.height=210*d;var x=c.getContext('2d');x.setTransform(d,0,0,d,0,0);var W=r.width,H=210;

var lo=Math.min.apply(0,e.concat([100000])),hi=Math.max.apply(0,e.concat([100000]));var pad=(hi-lo)*0.15||100;lo-=pad;hi+=pad;
function px(i){return 8+i*(W-16)/(e.length-1);}function py(v){return H-12-(v-lo)/(hi-lo)*(H-24);}

x.strokeStyle='#26405e';x.setLineDash([4,4]);x.beginPath();x.moveTo(8,py(100000));x.lineTo(W-8,py(100000));x.stroke();x.setLineDash([]);

x.strokeStyle='#46e6c8';x.lineWidth=2;x.shadowColor='#46e6c8';x.shadowBlur=10;x.stroke();x.shadowBlur=0;
x.fillStyle='#46e6c8';x.beginPath();x.arc(px(n-1),py(e[n-1]),3.5,0,7);x.fill();
if(prog<1){prog+=0.05;requestAnimationFrame(fr);}}fr();}
